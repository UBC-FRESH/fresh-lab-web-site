name: Roadmap task
description: Child issue for a roadmap task.
title: "P?.?: "
labels: ["roadmap-task"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task Metadata
      value: |
        Roadmap task:
        Parent phase issue:
        Status:
        Branch:
        Related planning notes:
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal And Rationale
      description: What does this task provide, and why does it matter?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      value: |
        In scope:
        - 

        Out of scope:
        - 
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Implementation Notes
      description: Files, commands, content rules, deployment constraints, or repo patterns to follow.
    validations:
      required: false
  - type: textarea
    id: subtasks
    attributes:
      label: Subtasks
      value: |
        Checklist:
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      value: |
        - 
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      value: |
        - [ ] `python -m pytest`
        - [ ] `python -m ruff check .`
        - [ ] `python scripts/build.py`
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks And Follow-Up
      description: Known risks, edge cases, or intentionally deferred work.
    validations:
      required: false
