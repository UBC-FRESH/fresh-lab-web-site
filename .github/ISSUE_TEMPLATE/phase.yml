name: Roadmap phase
description: Parent issue for a roadmap phase.
title: "Phase N: "
labels: ["roadmap", "phase"]
body:
  - type: textarea
    id: phase
    attributes:
      label: Phase Metadata
      description: Identify the roadmap phase and implementation branch.
      value: |
        Phase identifier:
        Status:
        Branch:
        Roadmap link:
        Related planning notes:
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What capability or project state should this phase create?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this phase?
      value: |
        In scope:
        - 

        Out of scope:
        - 
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow Notes
      description: Architecture, content, deployment, or review notes that govern the phase.
    validations:
      required: false
  - type: textarea
    id: children
    attributes:
      label: Child Issue Checklist
      description: Add child tasks once created.
      value: |
        Checklist:
        - [ ] P?.1
        - [ ] P?.2
        - [ ] P?.3
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      value: |
        - 
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification And Closeout
      value: |
        Verification:
        - [ ] `python -m pytest`
        - [ ] `python -m ruff check .`
        - [ ] `python scripts/build.py`

        Closeout:
        - [ ] Update `ROADMAP.md`.
        - [ ] Update `CHANGE_LOG.md`.
        - [ ] Update relevant planning notes.
        - [ ] Open or merge the phase PR.
    validations:
      required: true

